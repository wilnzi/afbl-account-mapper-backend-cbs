status = warn
name = Log4j2PropertiesConfig
#property.basePath = /opt/litas-cbs/logs
property.basePath = D:\\LOG
property.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
property.severityLevel = info
property.debugSeverityLevel = error

appenders = console, file

appender.console.type = Console
appender.console.name = LogToConsole
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = ${pattern}

appender.file.type = File
appender.file.name = LOGFILE
appender.file.fileName=${basePath}/litas-cbs.log
appender.file.layout.type=PatternLayout
appender.file.layout.pattern= ${pattern}
appender.file.filter.threshold.type = ThresholdFilter
appender.file.filter.threshold.level = debug

# RollingFileAppender name, pattern, path and rollover policy
appender.rolling.type = RollingFile
appender.rolling.name = fileLogger
appender.rolling.fileName= ${basePath}/litas-cbs.log
appender.rolling.filePattern= ${basePath}/app_%d{yyyyMMdd}.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = ${pattern}
appender.rolling.policies.type = Policies

# RollingFileAppender rotation policy
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 1MB
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.delete.type = Delete
appender.rolling.strategy.delete.basePath = ${basePath}
appender.rolling.strategy.delete.maxDepth = 10
appender.rolling.strategy.delete.ifLastModified.type = IfLastModified

# Delete all files older than 30 days
appender.rolling.strategy.delete.ifLastModified.age = 7d

#Logger du package principal
logger.app.name = lr.afrilandfirstbankliberia.litascbs
logger.app.level = ${severityLevel}
logger.app.additivity = false
#logger.app.appenderRefs = stdout
logger.app.appenderRefs = stdout,file
logger.app.appenderRef.stdout.ref = LogToConsole
logger.app.appenderRef.file.ref = LOGFILE

#Configuraton du logger pour org.springframework.transaction
logger.transaction.name=org.springframework.transaction
logger.transaction.level=${debugSeverityLevel}
logger.transaction.additivity = false
logger.transaction.appenderRefs = stdout,file
logger.transaction.appenderRef.stdout.ref = LogToConsole
logger.transaction.appenderRef.file.ref = LOGFILE

logger.core.name=org.springframework.jdbc.core
logger.core.level=${debugSeverityLevel}
logger.core.additivity = false
logger.core.appenderRefs = stdout,file
logger.core.appenderRef.stdout.ref = LogToConsole
logger.core.appenderRef.file.ref = LOGFILE

#Configuraton du logger pour org.springframework.transaction
logger.sql.name=org.hibernate.SQL
logger.sql.level=${debugSeverityLevel}
logger.sql.additivity = false
logger.sql.appenderRefs = stdout,file
logger.sql.appenderRef.stdout.ref = LogToConsole
logger.sql.appenderRef.file.ref = LOGFILE


#Configuraton du logger pour org.springframework.transaction
#logger.transaction.name=spring.jpa.hibernate
#logger.transaction.level=${debugSeverityLevel}
#logger.transaction.additivity = false
#logger.transaction.appenderRefs = stdout
#logger.transaction.appenderRef.stdout.ref = LogToConsole


#Logger de tout le systeme
rootLogger.level = ${severityLevel}
#rootLogger.appenderRefs = stdout
rootLogger.appenderRefs = stdout,file
rootLogger.appenderRef.stdout.ref = LogToConsole
rootLogger.appenderRef.file.ref = LOGFILE


